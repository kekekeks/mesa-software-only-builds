name: Build

on:
  push:
    branches: [main, master, ci/*]
    tags: ['*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  linux:
    name: Build + smoke test (linux-x64)
    runs-on: ubuntu-22.04
    outputs:
      mesa_version: ${{ steps.mesa.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read pinned Mesa version
        id: mesa
        run: echo "version=$(sed -E 's/[^0-9.].*$//' external/mesa/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build single .so (Debian 12 container)
        run: ./build/build-linux.sh

      - name: Smoke test (clean container, no mesa)
        run: ./tests/smoke/run.sh linux-x64

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/linux-x64/
          if-no-files-found: error

  windows:
    name: Build + smoke test (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2 (MinGW64, static LLVM)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git base-devel bison flex
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-mako
            mingw-w64-x86_64-python-packaging
            mingw-w64-x86_64-python-yaml
            mingw-w64-x86_64-glslang
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd

      - name: Build single DLL (MinGW, static LLVM)
        run: ./build/build-windows.sh

      - name: Smoke test (LoadLibrary + render a quad)
        run: |
          gcc -O2 -Wall -I external/mesa/include tests/smoke/smoke.c -o smoke.exe
          ./smoke.exe artifacts/win-x64/softmesa.dll

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error

  macos:
    name: Build + smoke test (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-14   # Apple silicon
          - rid: osx-x64
            runner: macos-13   # Intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tools (Homebrew + pip)
        run: |
          brew install llvm meson ninja glslang pkgconf bison flex
          python3 -m pip install --break-system-packages --user mako pyyaml packaging

      - name: Build single dylib (static LLVM)
        env:
          RID: ${{ matrix.rid }}
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          export PATH="$HOME/Library/Python/$(python3 -c 'import sys;print("%d.%d"%sys.version_info[:2])')/bin:$PATH"
          ./build/build-macos.sh

      - name: Smoke test (dlopen + render a quad)
        run: |
          clang -O2 -Wall -I external/mesa/include tests/smoke/smoke.c -o smoke
          ./smoke artifacts/${{ matrix.rid }}/libsoftmesa.dylib

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}/
          if-no-files-found: error

  pack:
    name: Pack NuGet
    needs: [linux, windows, macos]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download linux native
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/linux-x64/

      - name: Download windows native
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64/

      - name: Download macOS arm64 native
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: artifacts/osx-arm64/

      - name: Download macOS x64 native
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: artifacts/osx-x64/

      - name: Pack NuGet
        env:
          # Version = <pinned mesa version>.<run number>, e.g. 25.3.6.42
          MESA_VERSION: ${{ needs.linux.outputs.mesa_version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./build/pack-nuget.sh

      - name: Upload nupkgs
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
